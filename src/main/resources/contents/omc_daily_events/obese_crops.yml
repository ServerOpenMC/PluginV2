# assets from https://github.com/0rc1nus/Overweight-Farming

info:
  namespace: omc_daily_events

items:
  # --- Potato ---
  obese_potato:
    display_name: Patate obèse
    graphics:
      textures:
        north: obese_crops/basic/potato/obese_potato_side
        south: obese_crops/basic/potato/obese_potato_side
        east: obese_crops/basic/potato/obese_potato_side
        west: obese_crops/basic/potato/obese_potato_side
        up: obese_crops/basic/potato/obese_potato_top
        down: obese_crops/basic/potato/obese_potato_bottom
    behaviours:
      block:
        placed_model:
          type: REAL_NOTE
          break_particles: ITEM
        up_block: omc_daily_events:obese_potato_stem
        hardness: 5
        break_tools_blacklist:
          - WOODEN_HOE
          - STONE_HOE
          - IRON_HOE
          - COPPER_HOE
        break_tools_whitelist:
          - NETHERITE_HOE
          - DIAMOND_HOE
        events_tools_whitelist:
          - NETHERITE_HOE
          - DIAMOND_HOE
    events:
      placed_block:
        interact:
          play_sound:
            name: item.axe.strip
            volume: 1.0
            pitch: 0.6
            category: MASTER
            stop_previous: false
          replace_block:
            delay: 5
            from: omc_daily_events:obese_potato
            to: omc_daily_events:peeled_obese_potato
          replace_near_blocks:
            radius: 5
            delay: 5
            from: omc_daily_events:obese_potato_stem
            to: AIR
          decrement_durability:
            amount: 5

  obese_poisonous_potato:
    display_name: Patate empoisonnée obèse
