  golden_pumpkin:
    display_name: Citrouille dorée
    lore:
      - "§7§oUne citrouille avec une touche d'or"
    graphics:
      textures:
        north: golden_crops/pumpkin/golden_pumpkin_side
        south: golden_crops/pumpkin/golden_pumpkin_side
        east: golden_crops/pumpkin/golden_pumpkin_side
