feature.dream.milestone.quest.altar.dialog=<dark_aqua>Traveler: To obtain the Soul Orb, you will need...</dark_aqua>\
  <br><gold>Souls?!</gold>\
  <br><dark_aqua>Traveler: Yes! That's it! You will need some </dark_aqua>%1$s\
  <br><dark_aqua>Traveler: But be careful, they love the weather even more than the creakings</dark_aqua>\
  <br><gold>How can I find them, and how do I recognize them?</gold>\
  <br><dark_aqua>Traveler: Look around the altar, towards the </dark_aqua><light_purple>trees</light_purple><dark_aqua>. Souls wander outside the building.</dark_aqua>\
  <br><dark_aqua>Traveler: Just like the "Creaking" armor, it is possible to have the armor of </dark_aqua><light_purple>"Souls"</light_purple><dark_aqua>. This will give you </dark_aqua>%2$s<dark_aqua> additional seconds per equipped armor piece.</dark_aqua>\
  <br><dark_aqua>Traveler: You can also transform your ax at the altar with a few extra souls.</dark_aqua>
feature.dream.milestone.quest.cloud_castle.dialog=<gold>This castle is nothing like anything I know. How come it stays suspended in the clouds?</gold>\
  <br><dark_aqua>Traveler: As said before, these ancient people have tamed the power of the winds. But with what happened, I think the power turned in on itself to protect the treasure.</dark_aqua>\
  <br><gold>The Orb...</gold>\
  <br><dark_aqua>Traveler: Correct! This castle should remind you of </dark_aqua><light_purple>trial chambers</light_purple><dark_aqua> of your world.</dark_aqua>\
  <br><gold>So you know my world?</gold>\
  <br><dark_aqua>Traveler: ...</dark_aqua>
feature.dream.milestone.quest.cloud_valley.dialog=<gold>We are in a full... of clouds???</gold>\
  <br><dark_aqua>Traveler: This is a story of an ancient people who had tamed the forces of the wind.</dark_aqua>\
  <br><dark_aqua>Traveler: You should be able to find some </dark_aqua><light_purple>remains of their civilization</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>That's to say ?</gold>\
  <br><dark_aqua>Traveler: You have found the </dark_aqua>%1$s<dark_aqua> No ?</dark_aqua>
feature.dream.milestone.quest.craft_domination_orb.dialog=<gold>Here is the orb, what should I do with it?</gold>\
  <br><dark_aqua>Traveler: This orb is the first in a series of </dark_aqua><light_purple>5</light_purple><dark_aqua> scattered in this world. Each orb is unique and has the ability to move you forward in the world and in my...our quest!</dark_aqua>\
  <br><gold>So we need to explore the new area unlocked by the orb?</gold>\
  <br><dark_aqua>Traveler: That's right! We will have to find the </dark_aqua><light_purple>Temple </light_purple><dark_aqua>of the master of the place. You shouldn't miss it, I think...</dark_aqua>
feature.dream.milestone.quest.craft_eternal_fire.dialog=<dark_aqua>Traveler: Good! This fire will be useful to you.</dark_aqua>\
  <br><gold>It's a fire, will it allow me to cook something?</gold>\
  <br><dark_aqua>Traveler: In this world, this fire will serve you to limit the </dark_aqua><light_purple>effects of cold </light_purple><dark_aqua>depths. You're going to enter a freezing world, every second spent in it </dark_aqua><light_purple>will slow you down </light_purple><dark_aqua>and will end up </dark_aqua><light_purple>kill you</light_purple><dark_aqua>.</dark_aqua>\
  <br><dark_aqua>Traveler: By placing this fire on the ground and staying close to it, you will warm yourself and avoid this.</dark_aqua>\
  <br><gold>Like when you come out of powder snow.</gold>\
  <br><dark_aqua>Traveler: Yes. Now that you understand the principle, let's go looking for </dark_aqua><light_purple>camps </light_purple><dark_aqua>present in the </dark_aqua><light_purple>deep caves</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.craft_singularity.dialog=<gold>So ! What must we do to be able to turn back time now?</gold>\
  <br><dark_aqua>Traveler: ...</dark_aqua>\
  <br><dark_aqua>Traveler: I... I'm going to tell you something. It was never a question of going back in time in this dimension, but of being able to transfer myself to another dimension in order to escape the misfortunes of this world. My goal has always been to help people, but that has not been possible in this dimension.</dark_aqua>\
  <br><dark_aqua>Traveler: I didn't want to talk to you about it at the risk of appearing selfish.</dark_aqua>\
  <br><dark_aqua>Traveler: Unfortunately for me, the singularity we have is not powerful enough to be able to transfer life into your dimension in order to be able to make a fresh start and be able to help people.</dark_aqua>\
  <br><dark_aqua>Traveler: But that doesn't matter, I liked it to help you explore this world and especially to be able to recover objects that will undoubtedly be useful to you in your world.</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Traveler: I failed to save this dimension, but I still managed to help "you" in this dimension.</dark_aqua>\
  <br><dark_aqua>Traveler: Whatever happens, you will be able to </dark_aqua><light_purple>recover enchantments </light_purple><dark_aqua>of this dimension thanks to the singularity and even the</dark_aqua><light_purple>armor </light_purple><dark_aqua>if you wish.</dark_aqua>\
  <br><dark_aqua>Traveler: The singularity is not powerful enough for me, but more than enough for new weapons or armor.</dark_aqua>\
  <br><dark_aqua>Traveler: Just like the previous orbs, you have the ability to craft new armor. This one, on the other hand, will require redoing all the orbs, but it's worth it, because it adds </dark_aqua>%1$s<dark_aqua> seconds more per piece worn, but also effects.</dark_aqua>\
  <br><gold>... THANKS !</gold>\
  <br><dark_aqua>Traveler: No! It's me who thanks you. Because one day, someone I respected as a person said to me: “Thank the person you helped, because they allowed you to do a good deed.”</dark_aqua>\
  <br><gold>Will you stay with me?</gold>\
  <br><dark_aqua>Traveler: No, I can't. Other players are getting lost here, and they need me. So I bid you farewell...</dark_aqua>
feature.dream.milestone.quest.crafting_table.dialog=<gold>Okay, now that I have the table, let's look for something to make some tools and... how come there are Crackers here!?</gold>\
  <br><dark_aqua>Traveler: You have a good eye. This world is full of amazing creatures that have one thing in common: they feed on </dark_aqua><light_purple>time</light_purple><dark_aqua>, in you </dark_aqua><light_purple>flying</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>So that’s that bar up there?</gold>\
  <br><dark_aqua>Traveler: Yes, and this time is not infinite, which is why we must act quickly. Let's take advantage of being among these creatures to recover their </dark_aqua><light_purple>hearts</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.crafts.dialog=<gold>Sounds like normal survival, right?</gold>\
  <br><dark_aqua>Traveler: Indeed, this world may be dark, new and complex, but it is not that different from the Overworld. But a dimension is added: the </dark_aqua><light_purple>time </light_purple><dark_aqua>! For the moment, you can only access the </dark_aqua>%1$s<dark_aqua>, but the other biomes will soon be accessible.</dark_aqua>\
  <br><gold>Hmmm, that intrigues me. But you said we're short on time, so let's not hang around. I need one </gold><light_purple>craft table</light_purple><gold>.</gold>
feature.dream.milestone.quest.creaking_heart.dialog=<gold>Ah! But it's true that they protect their hearts.</gold>\
  <br><dark_aqua>Traveler: Yes, and these will be useful to us later, the crafts of this world use a lot of them. Whether for tools, armor, or various objects of this world. Start by making yourself a </dark_aqua><light_purple>ax</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>But what is the purpose of this world??</gold>\
  <br><dark_aqua>Traveler: I'll explain to you soon, I don't want you to end up like me...</dark_aqua>\
  <br><gold>What does it mean to “end up like you”?</gold>\
  <br><dark_aqua>Traveler: You will understand. To avoid this, you must continue, make yourself an ax for the moment.</dark_aqua>
feature.dream.milestone.quest.crystallized_pickaxe.dialog=<dark_aqua>Traveler: This one will be your best friend in the </dark_aqua><light_purple>caves</light_purple><dark_aqua>, replacing your axe.</dark_aqua>\
  <br><dark_aqua>Traveler: From now on, you'll mainly have to mine. The depths of this world are full of </dark_aqua><light_purple>useful minerals </light_purple><dark_aqua>for the </dark_aqua><light_purple>last step </light_purple><dark_aqua>of this quest.</dark_aqua>\
  <br><gold>So let's not hang around, let's go to the cave.</gold>\
  <br><dark_aqua>Traveler: No! Before going to get the last orb, take a detour to the coordinates </dark_aqua><red>X: </red>%1$s <blue>Z: </blue>%2$s<dark_aqua>. As promised, I owe you an explanation.</dark_aqua>
feature.dream.milestone.quest.cube_temple.dialog=<dark_aqua>Traveler: Know that this is an altar that was erected to...</dark_aqua>\
  <br><gold>For ?</gold>\
  <br><dark_aqua>Traveler: ...</dark_aqua>\
  <br><dark_aqua>Traveler: Let's move on, now is not the time. Let's stick to the fact that he is the master of the place.</dark_aqua>\
  <br><gold>What does the master of the place mean?</gold>\
  <br><dark_aqua>Traveler: No matter, now that you understand the principle of this dimension, I will be able to talk to you about its </dark_aqua><light_purple>aim </light_purple><dark_aqua>and what we do here.</dark_aqua>\
  <br><dark_aqua>Traveler: Start by going to the </dark_aqua><light_purple>center of the temple</light_purple><dark_aqua> and drop the orb.</dark_aqua>
feature.dream.milestone.quest.ewenite.dialog=<gold>The beginning of wealth. Whether it's mining or trading them, I have a feeling it's going to be a long search.</gold>\
  <br><dark_aqua>Traveler: The ore is not common, but you can find several quickly.</dark_aqua>\
  <br><gold>Isn't there a way to go faster?</gold>\
  <br><dark_aqua>Traveler: You can make your own </dark_aqua><light_purple>Clockwork Pickaxe </light_purple><dark_aqua>If you want, it will be faster.</dark_aqua>
feature.dream.milestone.quest.find_cube.dialog=<dark_aqua>Traveler: This is the origin of the catastrophe of this world. This is the </dark_aqua><light_purple>"Cube"</light_purple><dark_aqua>, the master of the place. He was worshiped by the people of this dimension who built the temples you saw. His name: </dark_aqua><light_purple>Bobby</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>But what did he do and why is there no sculk around him?</gold>\
  <br><dark_aqua>Traveler: In the beginning, this one brought us peace and prosperity. But one day, a violent storm would have come, a lightning would have struck it and damaged it. </dark_aqua>\
  <br><dark_aqua>Traveler: The cube, after having regenerated for a long period of time, would have started to move and little by little, </dark_aqua><light_purple>corrupt </light_purple><dark_aqua>the world, but by installing a </dark_aqua><light_purple>self-sufficient ecosystem </light_purple><dark_aqua>for his new state. That is to say, it protects itself and propagates alone, feeding on the </dark_aqua><light_purple>life </light_purple><dark_aqua>of the world.</dark_aqua>\
  <br><dark_aqua>Traveler: This led to the </dark_aqua><light_purple>anhilation </light_purple><dark_aqua>or the </dark_aqua><light_purple>corruption </light_purple><dark_aqua>of all life in this place.</dark_aqua>\
  <br><gold>And you in all this, who are you? Since the beginning of our adventure, you have been talking to me, but you are not really there.</gold>\
  <br><dark_aqua>Traveler: It is very likely that I am no longer in this world, at least physically. When the cube corrupted the card, instead of fighting against it, I used it to </dark_aqua><light_purple>destroy my body</light_purple><dark_aqua>, by forcing the </dark_aqua><light_purple>survival </light_purple><dark_aqua>of my mind. Since I used the cube to survive, it can't take me out without killing itself.</dark_aqua>\
  <br><dark_aqua>Traveler: I am then here to help everyone </dark_aqua><light_purple>get back to your old life</light_purple><dark_aqua>. When I saw you coming, I followed you so that you could </dark_aqua><light_purple>realize </light_purple><dark_aqua>in my place, the quest I was supposed to carry out.</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Traveler: Now that you know a little more, we must move forward in the quest that is now yours. Direction : </dark_aqua><light_purple>the caves</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.glacite_orb.dialog=<dark_aqua>Traveler: Finally, we have reached our goal. Much more than just one step to finally be free from this situation.</dark_aqua>\
  <br><gold>What should I do?</gold>\
  <br><dark_aqua>Traveler: They need to be </dark_aqua><light_purple>combine</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Combine them? No incantation this time?</gold>\
  <br><dark_aqua>Traveler: No, I promise. Combine them in the </dark_aqua><light_purple>craft table </light_purple><dark_aqua>that we both made at the start of our adventure. We can then use the power of </dark_aqua><light_purple>singularity</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.grotto_camp.dialog=<gold>This is a camp.</gold>\
  <br><dark_aqua>Traveler: Let's see if we can find the last keeper of the orb. He must be around.</dark_aqua>\
  <br><gold>But if the Cube corrupted and killed everything, how can the merchant still be alive?</gold>\
  <br><dark_aqua>Traveler: The orb, my friend. Before, he was a traveling merchant who traveled the world to trade his goods.</dark_aqua>\
  <br><dark_aqua>Traveler: And each orb has a power, and I think that of the</dark_aqua><light_purple>Ice Orb </light_purple><dark_aqua>allowed this merchant to survive, but at what cost...</dark_aqua>
feature.dream.milestone.quest.illusionist.dialog=<gold>There's the merchant. He doesn't seem to want to move anymore.</gold>\
  <br><dark_aqua>Traveler: As I said before, corruption has </dark_aqua><light_purple>amended </light_purple><dark_aqua>deeply, even if the orb has it </dark_aqua><light_purple>protected </light_purple><dark_aqua>of death.</dark_aqua>\
  <br><dark_aqua>Traveler: I haven't told you about this until now, but haven't you noticed anything in each place where we found an orb?</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Traveler: The orbs have </dark_aqua><light_purple>preserved </light_purple><dark_aqua>the lives around them. Creakings, Spiders, Souls, Breeze, Phantom, Wanderer, Frogs, Tadpoles, and here the merchant.</dark_aqua>\
  <br><dark_aqua>Traveler: But it's up to us to really bring her back. So go ahead, do it</dark_aqua><light_purple>exchange </light_purple><dark_aqua>for the Orb.</dark_aqua>
feature.dream.milestone.quest.kill_breezy.dialog=<gold>But this Breeze is crazy!!</gold>\
  <br><dark_aqua>Traveler: Yes, that's what I feared...even here, everything has been corrupted.</dark_aqua>\
  <br><gold>How is that corrupt?</gold>\
  <br><dark_aqua>Traveler: Explanations will arrive in due time. For now, come back down to earth, and head towards the </dark_aqua><light_purple>beaches</light_purple><dark_aqua>. I wish I could say fine sand...</dark_aqua>\
  <br><dark_aqua>Traveler: But before leaving, you can collect the</dark_aqua><light_purple>Cloud Armor</light_purple><dark_aqua>, who will give you </dark_aqua>%1$s<dark_aqua> seconds of extra time per piece of armor. You can also recover a </dark_aqua><light_purple>cloud fishing rod</light_purple><dark_aqua>, and a </dark_aqua><light_purple>enchanted book</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>A fishing rod? But to fish for what? Cloud droplets?!</gold>\
  <br><dark_aqua>Traveler: Exactly! This will allow you to fish in the clouds as if it were a lake. In particular, you will be able to recover </dark_aqua><light_purple>sleeping pills </light_purple><dark_aqua>which allow you to stay asleep longer, or to fall asleep effectively, if you are awake.</dark_aqua>
feature.dream.milestone.quest.metal_detector.dialog=<dark_aqua>Traveler: Ah, finally the detector. We will be able to search for the orb in this mud more easily.</dark_aqua>\
  <br><dark_aqua>Traveler: These beaches used to be sand and water. But with the disaster, </dark_aqua><light_purple>frogs </light_purple><dark_aqua>And </dark_aqua><light_purple>tadpoles </light_purple><dark_aqua>have transformed. This transformation resulted, for them, in a </dark_aqua><light_purple>great thirst</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Hence the absence of water.</gold>
feature.dream.milestone.quest.mud_beach.dialog=<gold>Finally on the beach, and indeed, there is no warm sand, no radiant sun, just mud and... nothing else actually.</gold>\
  <br><dark_aqua>Traveler: Very well, sit there, I owe you an explanation.</dark_aqua>\
  <br><dark_aqua>Traveler: This world has undergone a </dark_aqua><light_purple>disaster</light_purple><dark_aqua>, hence its appearance. Before, he was so...if only I could see him again.</dark_aqua>\
  <br><gold>You told me about five orbs. Would these make it possible to bring back the old world, with the power of terraforming?</gold>\
  <br><dark_aqua>Traveler: No, it's much more powerful than that. They allow you to create a </dark_aqua><light_purple>wormhole </light_purple><dark_aqua>between this </dark_aqua><light_purple>dimension and yours</light_purple><dark_aqua>. We can then use part of the</dark_aqua><light_purple>energy </light_purple><dark_aqua>of your size for </dark_aqua><light_purple>go back in time </light_purple><dark_aqua>in it, and restore its balance.</dark_aqua>\
  <br><gold>Use part of the energy? But, is this without risk for my dimension??</gold>\
  <br><dark_aqua>Traveler: Yes, of course, otherwise I wouldn't take the risk. Each block of your world would give a small pearl of its energy.</dark_aqua>\
  <br><gold>What energy?</gold>\
  <br><dark_aqua>Traveler: We must move forward now. Looking for </dark_aqua><light_purple>frogs</light_purple><dark_aqua>, they will be useful to us.</dark_aqua>
feature.dream.milestone.quest.mud_orb.dialog=<gold>It reminds me of my vacation searching for treasures on the beach. Even if it's for a better cause. And now that the 4th orb is with us, what should I do?</gold>\
  <br><dark_aqua>Traveler: More than one. As we have done all the surface and the clouds, then all we have to do is search </dark_aqua><light_purple>underground</light_purple><dark_aqua>. You will need to prepare well, and in particular </dark_aqua><light_purple>good fire</light_purple><dark_aqua>. As for the detector, you should have seen that we obtained several things.</dark_aqua>\
  <br><gold>Yes, my inventory is full.</gold>\
  <br><dark_aqua>Traveler: Just like the fishing rod, you can obtain various items there like </dark_aqua><light_purple>chips</light_purple><dark_aqua>, even if some are very rare, </dark_aqua><light_purple>sleeping pills</light_purple><dark_aqua>, another </dark_aqua><light_purple>enchanted book</light_purple><dark_aqua>, or even a </dark_aqua><light_purple>pickaxe </light_purple><dark_aqua>which will be useful to you later... I'm going to check if you don't already have one.</dark_aqua>
feature.dream.milestone.quest.old_axe.dialog=<dark_aqua>Traveler: Good! This will be useful to us. The next objective is going to be to get the</dark_aqua><light_purple>Orb of Domination</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>What will it be used for?</gold>\
  <br><dark_aqua>Traveler: I'll explain it to you when you get it. It will be easy to recover with the axe.</dark_aqua>\
  <br><gold>Do I need anything else?</gold>\
  <br><dark_aqua>Traveler: It's not obligatory, but it would allow you to stay longer in this world. There is armor </dark_aqua><light_purple>“Creaking” </light_purple><dark_aqua>that you can make. This will give you </dark_aqua>%1$s<dark_aqua> additional seconds per equipped armor piece.</dark_aqua>
feature.dream.milestone.quest.sleep.dialog=<gold>ZZZzzz...what's happening!? Am I dreaming? This... world looks so different from the Overworld!</gold>\
  <br><dark_aqua>Traveler: What...? How is this possible??! I thought I was the only one here. And it's been so long since I've seen anyone...</dark_aqua>\
  <br><gold>But, who are you? Where are you? and why are you talking to me??</gold>\
  <br><dark_aqua>Traveler: Well, welcome. But everything in its time. Time which we will miss, we must act quickly, I will explain everything to you as we go along. For now, I suggest you discover what you will need to discover this world with the command </dark_aqua><light_purple>/crafts</light_purple><dark_aqua>.</dark_aqua>\
  <br><dark_aqua>Traveler: Please know that if you do not wish to stay until the end of time, you can wake up with the command </dark_aqua><light_purple>/leave</light_purple><dark_aqua>.\n<dark_aqua>Conversely, you can come back here more frequently by making yourself a </dark_aqua><light_purple>Pyjamas</light_purple><dark_aqua>. This allows you to increase your chances of passing into this world while sleeping.</dark_aqua>
feature.dream.milestone.quest.soul_orb.dialog=<gold>And two! On the other hand, I no longer have the Orb of Domination...</gold>\
  <br><dark_aqua>Traveler: Yes, you will have to do one again. But that's not the most complicated thing.</dark_aqua>\
  <br><dark_aqua>Traveler: Now that you have the Soul Orb, you will be able to access the </dark_aqua><light_purple>new area</light_purple><dark_aqua> which, you will see, does not at all resemble the current world...</dark_aqua>\
  <br><dark_aqua>Traveler: You must climb into the sky, into the </dark_aqua><light_purple>clouds</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Can you tell me a little about the purpose of this quest?</gold>\
  <br><dark_aqua>Traveler: The orbs are numbered </dark_aqua><light_purple>5</light_purple><dark_aqua>, and each of them contains a </dark_aqua><light_purple>power</light_purple><dark_aqua>. Alone, they are of no use. But together they could help this world.</dark_aqua>\
  <br><gold>And... who are you anyway?</gold>\
  <br><dark_aqua>Traveler: I was...</dark_aqua>\
  <br><dark_aqua>Traveler: I'm a gamer just like you, but a gamer </dark_aqua><light_purple>this world</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.souls.dialog=<gold>And of </gold>%1$s<gold> ! What should I do now? Is there a specific orb craft to do?</gold>\
  <br><dark_aqua>Traveler: No, you simply have to repeat the following incantation twice: </dark_aqua><light_purple>Ashkara no thari fu laq to</light_purple>\
  <br><gold>Ashkara no thari fu laq to! Ashkara no thari fu laq to!</gold>\
  <br><gold>...not easy to say...</gold>\
  <br><dark_aqua>Traveler: Ahah, actually, you just need to interact with the</dark_aqua><light_purple>Orb of Domination on</light_purple><light_purple>Altar</light_purple><dark_aqua>.</dark_aqua>

# * QUESTS
feature.dream.milestone.quest.transferable_object.reward=<green>There is a link between this dimension and the real world. And this is just the beginning of a new adventure!</green>

feature.dream.loot_table.cloud_fishing=<white>Cloud Fishing Loots</white>
feature.dream.loot_table.cloud_vault=<white>Cloud Chest Loot</white>
feature.dream.loot_table.metal_detector=<white>Metal Detector Loot</white>