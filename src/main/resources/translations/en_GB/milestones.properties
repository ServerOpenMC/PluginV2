feature.milestones.tutorial.name=OpenMC Tutorial
feature.milestones.tutorial.description.1=<gray>Discover <light_purple>OpenMC</light_purple> !</gray>
feature.milestones.tutorial.description.2=<gray>Review the <light_purple>features</light_purple></gray>
feature.milestones.tutorial.description.3=<dark_gray><italic>Cities, contests, the adminshop, quests, ...</italic></dark_gray>
feature.milestones.tutorial.description.4=<gray>Ideal for embarking on an adventure!</gray>

feature.milestones.tutorial.hologram.icon=%1$s
feature.milestones.tutorial.hologram.welcome=<white>Welcome to </white><light_purple>OpenMC V2</light_purple><white>!</white>
feature.milestones.tutorial.hologram.based_on=<white>This version is based on the </white><dark_green>cities</dark_green>
feature.milestones.tutorial.hologram.how_to=<white>To access the tutorial, use the command </white><green>/milestones</green><white>.</white>
feature.milestones.tutorial.hologram.server=<white>It's your </white><light_purple>server</light_purple><white>!</white>
feature.milestones.tutorial.hologram.separator=<dark_gray><strikethrough>                                  </strikethrough></dark_gray>
feature.milestones.tutorial.hologram.links=<white>Useful links: </white><dark_purple>/socials</dark_purple>

feature.milestones.tutorial.quest.spare_bank.name=Deposit money in the bank
feature.milestones.tutorial.quest.spare_bank.description=<white>Type </white><light_purple>/bank</light_purple><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the menu</white>\
  <br><dark_gray><italic>A competitive way to win big rewards!</italic></dark_gray>
feature.milestones.tutorial.quest.spare_bank.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! THE </white><aqua>banks</aqua><white> can store an infinite amount of money and protect it if you die! Now let's personalize the gaming experience using settings!</white>

feature.milestones.tutorial.quest.sell_buy.name=Buy or sell a resource in the adminshop
feature.milestones.tutorial.quest.sell_buy.description=<white>Type </white><red>/adminshop</red><white> or go to the </white><light_purple>main menu /menu</light_purple><white> to be able to sell or buy a resource</white>\
  <br><dark_gray><italic>This is the beginning of wealth!</italic></dark_gray>
feature.milestones.tutorial.quest.sell_buy.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! L'</white><red>adminshop</red><white> offers various items so you can build, or make money! However, when you die you lose </white>%2$s<white>% of your money! It is therefore important to pay attention to your skin, or else deposit money in your bank!</white>

feature.milestones.tutorial.quest.open_settings.name=Open settings menu
feature.milestones.tutorial.quest.open_settings.description=<white>Type </white><light_purple>/settings</light_purple><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the menu</white>\
  <br><dark_gray><italic>This will allow you to configure your gaming experience!</italic></dark_gray>
feature.milestones.tutorial.quest.open_settings.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! THE </white><blue>settings</blue><white> customize your game, they can be useful in certain cases, such as blocking friend requests, ... On a separate subject, you can switch to competition mode thanks to the </white><gold>contests</gold><white>, a sort of weekly competition!</white>

feature.milestones.tutorial.quest.open_quest.name=Open the quest menu
feature.milestones.tutorial.quest.open_quest.description=<white>Type </white><light_purple>/quests</light_purple><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the menu and see what quests you can complete</white>\
  <br><dark_gray><italic>This will launch you into adventure and give you challenges in order to diversify!</italic></dark_gray>
feature.milestones.tutorial.quest.open_quest.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! THE </white><blue>quests</blue><white> will help you get money easily for the </white><blue>start of game</blue><white> ! You can attempt to accomplish the </white><blue>stain</blue><white> whatever you want!</white>

feature.milestones.tutorial.quest.open_contest.name=Open the contests menu
feature.milestones.tutorial.quest.open_contest.description=<white>Type </white><light_purple>/contest</light_purple><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the menu</white>\
  <br><dark_gray><italic>A competitive way to win big rewards!</italic></dark_gray>
feature.milestones.tutorial.quest.open_contest.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! THE </white><gold>contests</gold><white> pit 2 groups against each other on a theme, the winners win a big reward! And here the tutorial is now finished, go and collect your reward in the </white><blue>mailbox</blue><white>, a letter system for receiving or sending letters!</white>

feature.milestones.tutorial.quest.open_adminshop.name=Open the adminshop menu
feature.milestones.tutorial.quest.open_adminshop.description=<white>Type </white><red>/adminshop</red><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the menu</white>\
  <br><dark_gray><italic>The market which varies according to supply and demand!</italic></dark_gray>
feature.milestones.tutorial.quest.open_adminshop.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! L'</white><red>adminshop</red><white> will help you get money and blocks! You can now sell or buy a resource in the adminshop!</white>

feature.milestones.tutorial.quest.home_upgrade.name=Improve your house limit
feature.milestones.tutorial.quest.home_upgrade.description=<white>Type </white><light_purple>/upgradehome</light_purple><white> or go to the </white><light_purple>menu of the homes (/homes)</light_purple>\
  <br><white>to be able to improve your house limit</white>\
  <br><dark_gray><italic>This will allow you to have more homes!</italic></dark_gray>
feature.milestones.tutorial.quest.home_upgrade.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! THE </white><dark_green>homes</dark_green><white> will be very useful for moving quickly between your bases! Now I think you need challenges! Open the menu of </white><blue>quests</blue><white>.</white>

feature.milestones.tutorial.quest.home_create.name=Place a home
feature.milestones.tutorial.quest.home_create.description=<white>Type </white><light_purple>/sethome</light_purple><white> by being where you want to put your home</white>\
  <br><dark_gray><italic>It's very useful to make one to teleport to your base!</italic></dark_gray>
feature.milestones.tutorial.quest.home_create.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! Homes are often used to avoid losing your base! You are limited to only having 1 home at the start. We will have to think about improving them...</white>

feature.milestones.tutorial.quest.finish_quest.name=Complete a quest
feature.milestones.tutorial.quest.finish_quest.description=<white>Complete a quest of your choice</white>\
  <br><dark_gray><italic>This will be able to give you money or certain resources!</italic></dark_gray>
feature.milestones.tutorial.quest.finish_quest.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! And here is a </white><blue>reward</blue><white> ! Practical, right? Let's discover another method of producing money and consuming it! Go into the</white><red>adminshop</red><white>, a place where several items can be purchased at varying prices depending on the</white><red>supply and demand</red><white> !</white>

feature.milestones.tutorial.quest.claim_letter.name=Open the rewards letter
feature.milestones.tutorial.quest.claim_letter.description=<white>Type </white><light_purple>/mailbox</light_purple><white> or go to the </white><light_purple>main menu (/menu)</light_purple><white> to be able to open the mailbox menu</white>\
  <br><dark_gray><italic>An efficient way to send items to other players!</italic></dark_gray>
feature.milestones.tutorial.quest.claim_letter.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! You have discovered the basics of OpenMC. And now, you're free to discover the features for yourself! With that, we wish you the best in your adventure on </white><light_purple>OpenMC</light_purple><white> !</white>

feature.milestones.tutorial.quest.city_create.name=Create/Join a city
feature.milestones.tutorial.quest.city_create.description=<white>Do </white><light_purple>/city</light_purple><white> to start creating your city</white>\
  <br><white>or join a city using an invitation!</white>
feature.milestones.tutorial.quest.city_create.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! This version of OpenMC is centered around cities. There you will find a </white><yellow>special milestone for cities</yellow><white> (/city milestone) who will guide you in this unique adventure! And if you passed your city to </white><dark_aqua>level 2</dark_aqua><white> ?</white>

feature.milestones.tutorial.quest.city_level_two.name=Have a level 2 city
feature.milestones.tutorial.quest.city_level_two.description=<white>Do </white><light_purple>/city milestone</light_purple><white> to find out more how</white>\
  <br><white>improve your city!</white>
feature.milestones.tutorial.quest.city_level_two.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! You're well on your way to discovering all the features hidden in cities! But before that, I would like you to ask a </white><dark_green>home</dark_green><white>.</white>

feature.milestones.tutorial.quest.break_aywenite.name=Break 30 Aywenites
feature.milestones.tutorial.quest.break_aywenite.description=<white>The new ore of </white><light_purple>V2</light_purple><white>, found in caves</white>\
  <br><white>It will be to you </white><light_purple>useful</light_purple><white> in many features</white>
feature.milestones.tutorial.quest.break_aywenite.reward=<white>Well done! You finished the</white><gold>stage </gold>%1$s<white> ! As said previously the</white><light_purple>Aywenite</light_purple><white> is an ore, valuable for features. Besides, you can use it to make your city!</white>

