feature.dream.milestone.quest.altar.dialog=<dark_aqua>Voyageur : Pour obtenir de l'orbe des âmes, il te faudra...</dark_aqua>\
  <br><gold>Des âmes ?!</gold>\
  <br><dark_aqua>Voyageur : Oui ! C'est ça ! Il t'en faudra </dark_aqua>%1$s\
  <br><dark_aqua>Voyageur : Mais fais attention à toi, elles adorent le temps encore plus que les creakings</dark_aqua>\
  <br><gold>Comment puis-je en trouver, et comment les reconnaître ?</gold>\
  <br><dark_aqua>Voyageur : Regarde autour de l'autel, vers les </dark_aqua><light_purple>arbres</light_purple><dark_aqua>. Les âmes se baladent à l'extérieur du bâtiment.</dark_aqua>\
  <br><dark_aqua>Voyageur : Tout comme l'armure "Creaking", il est possible d'avoir l'armure des </dark_aqua><light_purple>"Âmes"</light_purple><dark_aqua>. Celle-ci te confèrera </dark_aqua>%2$s<dark_aqua> secondes supplémentaires par pièces d'armure équipées.</dark_aqua>\
  <br><dark_aqua>Voyageur : Tu peux également transformer ta hache à l'autel avec quelques âmes supplémentaires.</dark_aqua>
feature.dream.milestone.quest.cloud_castle.dialog=<gold>Ce château ne ressemble en rien à ce que je connais. Comment se fait-il qu'il reste en suspension dans les nuages ?</gold>\
  <br><dark_aqua>Voyageur : Comme dit précédemment, cet ancien peuple a dompté le pouvoir des vents. Mais avec ce qu'il s'est passé, je pense que le pouvoir s'est renfermé sur lui-même pour protéger le trésor.</dark_aqua>\
  <br><gold>L'Orbe...</gold>\
  <br><dark_aqua>Voyageur : Exact ! Ce château devrait te rappeler les </dark_aqua><light_purple>trial chambers</light_purple><dark_aqua> de ton monde.</dark_aqua>\
  <br><gold>Tu connais donc mon monde ?</gold>\
  <br><dark_aqua>Voyageur : ...</dark_aqua>
feature.dream.milestone.quest.cloud_valley.dialog=<gold>Nous sommes dans une pleine... de nuages ???</gold>\
  <br><dark_aqua>Voyageur : Il s'agit d'une pleine d'un ancien peuple ayant dompté les forces du vent.</dark_aqua>\
  <br><dark_aqua>Voyageur : Tu devrais pouvoir y trouver des </dark_aqua><light_purple>restes de leur civilisation</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>C'est à dire ?</gold>\
  <br><dark_aqua>Voyageur : Tu as bien trouvé le </dark_aqua>%1$s<dark_aqua> non ?</dark_aqua>
feature.dream.milestone.quest.craft_domination_orb.dialog=<gold>Voilà l'orbe, que dois-je faire avec ?</gold>\
  <br><dark_aqua>Voyageur : Cet orbe est la première d'une série de </dark_aqua><light_purple>5</light_purple><dark_aqua> éparpillées dans ce monde. Chaque orbe est unique et possède la capacité de te faire avancer dans le monde et dans ma... notre quête !</dark_aqua>\
  <br><gold>Il nous faut donc explorer la nouvelle zone débloquée par l'orbe ?</gold>\
  <br><dark_aqua>Voyageur : C'est exact ! Il va falloir trouver le </dark_aqua><light_purple>Temple </light_purple><dark_aqua>du maître des lieux. Tu ne devrais pas le louper, je pense...</dark_aqua>
feature.dream.milestone.quest.craft_eternal_fire.dialog=<dark_aqua>Voyageur : Bien ! Ce feu te sera utile.</dark_aqua>\
  <br><gold>Il s'agit d'un feu, ça va me permettre de cuire quelque chose ?</gold>\
  <br><dark_aqua>Voyageur : Dans ce monde, ce feu te servira à limiter les </dark_aqua><light_purple>effets du froid </light_purple><dark_aqua>des profondeurs. Tu vas rentrer dans un monde glacial, chaque seconde passée dans celui-ci </dark_aqua><light_purple>te ralentira </light_purple><dark_aqua>et finira par </dark_aqua><light_purple>te tuer</light_purple><dark_aqua>.</dark_aqua>\
  <br><dark_aqua>Voyageur : En posant ce feu au sol et en restant proche de lui, tu vas te réchauffer et éviter cela.</dark_aqua>\
  <br><gold>Comme lorsqu'on sort de la poudreuse.</gold>\
  <br><dark_aqua>Voyageur : Oui. Maintenant que tu as compris le principe, partons à la recherche des </dark_aqua><light_purple>camps </light_purple><dark_aqua>présents dans les </dark_aqua><light_purple>grottes des profondeurs</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.craft_singularity.dialog=<gold>Voilà ! Que faut-il faire pour pouvoir maintenant remonter le temps ?</gold>\
  <br><dark_aqua>Voyageur : ...</dark_aqua>\
  <br><dark_aqua>Voyageur : Je... je vais t'avouer quelque chose. Il n'a jamais été question de remonter le temps dans cette dimension, mais de pouvoir me transférer dans une autre dimension afin d'échapper aux malheurs de ce monde. Mon but a bien toujours été d'aider les gens, mais cela n'a pas été possible dans cette dimension.</dark_aqua>\
  <br><dark_aqua>Voyageur : Je n'ai pas voulu t'en parler au risque de paraître égoïste.</dark_aqua>\
  <br><dark_aqua>Voyageur : Malheureusement pour moi, la singularité que nous avons n'est pas assez puissante pour pouvoir transférer da la vie dans ta dimension afin de pouvoir reprendre un nouveau départ et de pouvoir aider les gens.</dark_aqua>\
  <br><dark_aqua>Voyageur : Mais cela n'est pas grave, j'ai aimé pour t'aider à explorer ce monde et surtout à pouvoir récupérer des objets qui te seront sans doute utiles dans ton monde.</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Voyageur : Je n'ai pas réussi à sauver cette dimension, mais j'ai tout de même réussi à t'aider "toi" dans cette dimension.</dark_aqua>\
  <br><dark_aqua>Voyageur : Quoi qu'il en soit, tu vas pouvoir </dark_aqua><light_purple>récupérer les enchantements </light_purple><dark_aqua>de cette dimension grâce à la singularité et même l'</dark_aqua><light_purple>armure </light_purple><dark_aqua>si tu le souhaites.</dark_aqua>\
  <br><dark_aqua>Voyageur : La singularité n'est pas assez puissante pour moi, mais largement assez pour des nouvelles armes ou armures.</dark_aqua>\
  <br><dark_aqua>Voyageur : Tout comme les orbes précédents, tu as la possibilité de te fabriquer une nouvelle armure. Celle-ci en revanche va nécessiter de refaire l'ensemble des orbes, mais ça en vaut le coup, car elle rajoute </dark_aqua>%1$s<dark_aqua> secondes de plus par pièce portée, mais aussi des effets.</dark_aqua>\
  <br><gold>... Merci !</gold>\
  <br><dark_aqua>Voyageur : Non ! C'est moi qui te remercie. Car un jour, quelqu'un que je respectais comme personne m'a dit : "Remercie la personne que tu as aidé, car elle t'a permis de faire une bonne action".</dark_aqua>\
  <br><gold>Tu resteras avec moi ?</gold>\
  <br><dark_aqua>Voyageur : Non, je ne peux pas. D'autres joueurs se perdent ici, et ils ont besoin de moi. Alors, je te dis adieu...</dark_aqua>
feature.dream.milestone.quest.crafting_table.dialog=<gold>Bon, maintenant que j'ai la table, cherchons de quoi faire des outils et... comment se fait-il qu'il y ait des Craqueurs ici !?</gold>\
  <br><dark_aqua>Voyageur : Tu as le bon œil. Ce monde regorge de créatures étonnantes qui ont un point commun : elles se nourrissent de </dark_aqua><light_purple>temps</light_purple><dark_aqua>, en te le </dark_aqua><light_purple>volant</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>C'est donc cela cette barre là-haut ?</gold>\
  <br><dark_aqua>Voyageur : Oui, et ce temps n'est pas infini, c'est pourquoi nous devons faire vite. Profitons d'être au milieu de ces créatures pour récupérer leurs </dark_aqua><light_purple>coeurs</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.crafts.dialog=<gold>Cela ressemble à une survie normale, non ?</gold>\
  <br><dark_aqua>Voyageur : En effet, ce monde a beau être sombre, nouveau et complexe, il n'est pas si différent de l'Overworld. Mais une dimension se rajoute : le </dark_aqua><light_purple>temps </light_purple><dark_aqua>! Pour le moment, tu ne peux qu'accéder à la </dark_aqua>%1$s<dark_aqua>, mais les autres biomes seront bientôt accessibles.</dark_aqua>\
  <br><gold>Hmmm, cela m'intrigue. Mais tu as dit que l'on manque de temps, alors ne traînons pas. Il me faut une </gold><light_purple>table de craft</light_purple><gold>.</gold>
feature.dream.milestone.quest.creaking_heart.dialog=<gold>Ah ! Mais c'est vrai qu'ils protègent leurs cœurs.</gold>\
  <br><dark_aqua>Voyageur : Oui, et ceux-ci nous seront utiles par la suite, les crafts de ce monde en utilisent beaucoup. Que ce soit pour les outils, armures, ou objets divers de ce monde. Commence par te faire une </dark_aqua><light_purple>hache</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Mais quel est le but de ce monde ??</gold>\
  <br><dark_aqua>Voyageur : Je t'expliquerai bientôt, je n'ai pas envie que tu finisses comme moi...</dark_aqua>\
  <br><gold>Comment ça "finir comme toi" ?</gold>\
  <br><dark_aqua>Voyageur : Tu comprendras. Pour éviter cela, il faut continuer, fais-toi une hache pour le moment.</dark_aqua>
feature.dream.milestone.quest.crystallized_pickaxe.dialog=<dark_aqua>Voyageur : Celle-ci sera ta meilleure amie dans les </dark_aqua><light_purple>grottes</light_purple><dark_aqua>, en remplacement de ta hache.</dark_aqua>\
  <br><dark_aqua>Voyageur : À partir de maintenant, tu vas devoir principalement miner. Les profondeurs de ce monde regorgent de </dark_aqua><light_purple>minerais utiles </light_purple><dark_aqua>pour la </dark_aqua><light_purple>dernière étape </light_purple><dark_aqua>de cette quête.</dark_aqua>\
  <br><gold>Alors ne traînons pas, partons en grotte.</gold>\
  <br><dark_aqua>Voyageur : Non ! Avant d'aller chercher le dernier orbe, fais un détour aux coordonnées </dark_aqua><red>X: </red>%1$s <blue>Z: </blue>%2$s<dark_aqua>. Comme promis, je te dois des explications.</dark_aqua>
feature.dream.milestone.quest.cube_temple.dialog=<dark_aqua>Voyageur : Sache qu'il s'agit d'un autel qui a été érigé pour...</dark_aqua>\
  <br><gold>Pour ?</gold>\
  <br><dark_aqua>Voyageur : ...</dark_aqua>\
  <br><dark_aqua>Voyageur : Passons, ce n'est pas le moment. Restons sur le fait qu'il s'agit du maître des lieux.</dark_aqua>\
  <br><gold>Comment ça le maitre des lieux ?</gold>\
  <br><dark_aqua>Voyageur : Peu importe, maintenant que tu as compris le principe de cette dimension, je vais pouvoir te parler de son </dark_aqua><light_purple>but </light_purple><dark_aqua>et de ce que l'on fait ici.</dark_aqua>\
  <br><dark_aqua>Voyageur : Commence déjà par aller au </dark_aqua><light_purple>centre du temple</light_purple><dark_aqua> et déposer l'orbe.</dark_aqua>
feature.dream.milestone.quest.ewenite.dialog=<gold>Le début de la richesse. Qu'il s'agisse de miner ou de les échanger, j'ai l'impression que la recherche va être longue.</gold>\
  <br><dark_aqua>Voyageur : Le minerai n'est pas commun, mais tu peux en trouver plusieurs rapidement.</dark_aqua>\
  <br><gold>N'y a-t-il pas moyen d'aller plus vite ?</gold>\
  <br><dark_aqua>Voyageur : Tu peux te fabriquer la </dark_aqua><light_purple>Pioche mécanique </light_purple><dark_aqua>si tu le souhaites, ça sera plus rapide.</dark_aqua>
feature.dream.milestone.quest.find_cube.dialog=<dark_aqua>Voyageur : Voilà l'origine de la catastrophe de ce monde. Il s'agit du </dark_aqua><light_purple>"Cube"</light_purple><dark_aqua>, le maître des lieux. Il a été vénéré par le peuple de cette dimension qui a construit les temples que tu as vu. Son nom : </dark_aqua><light_purple>Bobby</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Mais qu'a-t-il fait et pourquoi n'y a-t-il pas de sculk autour de lui ?</gold>\
  <br><dark_aqua>Voyageur : Au début, celui-ci nous apportait paix et prospérité. Mais un jour, un violent orage serait survenu, un éclair l'aurait frappé et l'aurait endommagé. </dark_aqua>\
  <br><dark_aqua>Voyageur : Le cube après s'être régénéré durant une longue période, aurait commencé à bouger et peu à peu, à </dark_aqua><light_purple>corrompre </light_purple><dark_aqua>le monde, mais en installant un </dark_aqua><light_purple>écosystème autosuffisant </light_purple><dark_aqua>pour son nouvel état. C'est-à-dire que lui-même se protège et se propage seul, en se nourrissant de la </dark_aqua><light_purple>vie </light_purple><dark_aqua>du monde.</dark_aqua>\
  <br><dark_aqua>Voyageur : Cela a conduit à la </dark_aqua><light_purple>anhilation </light_purple><dark_aqua>ou la </dark_aqua><light_purple>corruption </light_purple><dark_aqua>de toute vie dans ce lieu.</dark_aqua>\
  <br><gold>Et toi dans tout cela, qui es-tu ? Depuis le début de notre aventure, tu me parles, mais tu n'es pas vraiment là.</gold>\
  <br><dark_aqua>Voyageur : Il est très probable que je ne sois plus de ce monde, du moins physiquement. Lorsque le cube a corrompu la carte, au lieu de lutter contre lui, le l'ai utilisé pour </dark_aqua><light_purple>détruire mon corps</light_purple><dark_aqua>, en forçant la </dark_aqua><light_purple>survie </light_purple><dark_aqua>de mon esprit. Étant donné que j'ai utilisé le cube pour survivre, il ne peut pas m'éliminer sans se tuer par lui-même.</dark_aqua>\
  <br><dark_aqua>Voyageur : Je suis alors présent pour aider se monde à </dark_aqua><light_purple>retrouver son ancienne vie</light_purple><dark_aqua>. Lorsque je t'ai vu arriver, je t'ai suivi afin que tu puisses </dark_aqua><light_purple>réaliser </light_purple><dark_aqua>à ma place, la quête que j'étais censé réaliser.</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Voyageur : Voilà, maintenant que tu en sais un peu plus, nous devons avancer dans la quête qui est désormais la tienne. Direction : </dark_aqua><light_purple>les grottes</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.glacite_orb.dialog=<dark_aqua>Voyageur : Enfin, nous touchons au but. Bien plus qu'une seule étape pour enfin être libéré de cette situation.</dark_aqua>\
  <br><gold>Que dois-je faire ?</gold>\
  <br><dark_aqua>Voyageur : Il faut les </dark_aqua><light_purple>combiner</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Les combiner ? Pas d'incantation cette fois ?</gold>\
  <br><dark_aqua>Voyageur : Non, promis. Combine-les dans la </dark_aqua><light_purple>table de craft </light_purple><dark_aqua>que nous avons confectionné tous les deux au début de notre aventure. Nous pourrons ensuite utiliser le pouvoir de la </dark_aqua><light_purple>singularité</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.grotto_camp.dialog=<gold>Voilà un camp.</gold>\
  <br><dark_aqua>Voyageur : Voyons si nous pouvons trouver le dernier dépositaire de l'orbe. Il doit être dans les parages.</dark_aqua>\
  <br><gold>Mais si le Cube à tout corrompu et tué, comment le marchand peut-il être encore vivant ?</gold>\
  <br><dark_aqua>Voyageur : L'orbe, mon ami. Avant, il s'agissait d'un marchand ambulant qui parcourait le monde pour échanger ses marchandises.</dark_aqua>\
  <br><dark_aqua>Voyageur : Et chaque orbe possède un pouvoir, et je pense celui de l'</dark_aqua><light_purple>Orbe de Glace </light_purple><dark_aqua>a permis à ce marchant de survivre, mais à quel prix...</dark_aqua>
feature.dream.milestone.quest.illusionist.dialog=<gold>Voilà le marchand. Il n'a plus l'air de vouloir se déplacer.</gold>\
  <br><dark_aqua>Voyageur : Comme je l'ai déjà dit, la corruption l'a </dark_aqua><light_purple>modifié </light_purple><dark_aqua>profondément, même si l'orbe l'a </dark_aqua><light_purple>protégé </light_purple><dark_aqua>de la mort.</dark_aqua>\
  <br><dark_aqua>Voyageur : Je ne t'en avais pas parlé jusqu'à présent, mais n'as-tu rien remarqué dans chaque lieu où nous avons trouvé un orbe ?</dark_aqua>\
  <br><gold>...</gold>\
  <br><dark_aqua>Voyageur : Les orbes ont </dark_aqua><light_purple>préservé </light_purple><dark_aqua>les vies autour d'eux. Creakings, Araignées, Âmes, Breeze, Phantom, Vagabond, Grenouilles, Têtards, et ici le marchand.</dark_aqua>\
  <br><dark_aqua>Voyageur : Mais à nous de la faire revenir réellement. Alors vas-y, fais l'</dark_aqua><light_purple>échange </light_purple><dark_aqua>pour l'Orbe.</dark_aqua>
feature.dream.milestone.quest.kill_breezy.dialog=<gold>Mais c'est qu'il est balèze ce Breeze !!</gold>\
  <br><dark_aqua>Voyageur : Oui, c'est ce que je craignais... même ici, tout a été corrompu.</dark_aqua>\
  <br><gold>Comment ça corrompu ?</gold>\
  <br><dark_aqua>Voyageur : Les explications arriveront en temps et en heures. Pour le moment, redescends sur terre, et dirige-toi vers les </dark_aqua><light_purple>plages</light_purple><dark_aqua>. J'aimerais pouvoir dire de sable fin...</dark_aqua>\
  <br><dark_aqua>Voyageur : Mais avant de partir, tu peux récupérer dans les coffres du château l'</dark_aqua><light_purple>Armure des Nuages</light_purple><dark_aqua>, qui te donnera </dark_aqua>%1$s<dark_aqua> secondes de temps supplémentaire par pièces d'armure. Tu peux également récupérer une </dark_aqua><light_purple>canne à pêche des nuages</light_purple><dark_aqua>, et un </dark_aqua><light_purple>livre enchanté</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Une canne à pêche ? Mais pour pêcher quoi ? Des gouttelettes de nuage ?!</gold>\
  <br><dark_aqua>Voyageur : Exactement ! Celle-ci te permettra de pêcher dans les nuages comme si c'était un lac. Tu pourras notamment récupérer des </dark_aqua><light_purple>somnifères </light_purple><dark_aqua>qui te permettent de rester plus longtemps endormi, ou de t'endormir efficacement, dans le cas où tu es éveillé.</dark_aqua>
feature.dream.milestone.quest.metal_detector.dialog=<dark_aqua>Voyageur : Ah, enfin le détecteur. Nous allons pouvoir rechercher l'orbe dans cette boue plus facilement.</dark_aqua>\
  <br><dark_aqua>Voyageur : Ces plages étaient avant bien de sable et d'eau. Mais avec la catastrophe, les </dark_aqua><light_purple>grenouilles </light_purple><dark_aqua>et </dark_aqua><light_purple>têtards </light_purple><dark_aqua>se sont transformés. Cette transformation s'est soldée, pour eux, par une </dark_aqua><light_purple>grande soif</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>D'où l'absence d'eau.</gold>
feature.dream.milestone.quest.mud_beach.dialog=<gold>Enfin sur la plage, et en effet, il n'y a ni sable chaud, ni soleil rayonnant, juste de la boue et... rien d'autre en fait.</gold>\
  <br><dark_aqua>Voyageur : Très bien, pose-toi là, je te dois des explications.</dark_aqua>\
  <br><dark_aqua>Voyageur : Ce monde, a subi une </dark_aqua><light_purple>catastrophe</light_purple><dark_aqua>, d'où son apparence. Auparavant, il était si... si seulement je pouvais le revoir.</dark_aqua>\
  <br><gold>Tu m'as parlé de cinq orbes. Ceux-ci permettraient-ils de faire revenir l'ancien monde, avec un pouvoir de terraformation ?</gold>\
  <br><dark_aqua>Voyageur : Non, c'est bien plus puissant que cela. Ils permettent de créer un </dark_aqua><light_purple>trou de ver </light_purple><dark_aqua>entre cette </dark_aqua><light_purple>dimension et la tienne</light_purple><dark_aqua>. Nous pourrons alors utiliser une partie de l'</dark_aqua><light_purple>énergie </light_purple><dark_aqua>de ta dimension pour </dark_aqua><light_purple>remonter le temps </light_purple><dark_aqua>dans celle-ci, et rétablir son équilibre.</dark_aqua>\
  <br><gold>Utiliser une partie de l'énergie ? Mais, cela est sans risque pour ma dimentsion ??</gold>\
  <br><dark_aqua>Voyageur : Oui, bien évidemment, sinon je n'en prendrais pas le risque. Chaque bloc de ton monde donnerait une petite perle de son énergie.</dark_aqua>\
  <br><gold>Quelle énergie ?</gold>\
  <br><dark_aqua>Voyageur : Nous devons avancer maintenant. Cherche des </dark_aqua><light_purple>grenouilles</light_purple><dark_aqua>, elles nous seront utiles.</dark_aqua>
feature.dream.milestone.quest.mud_orb.dialog=<gold>Cela me rappelle mes vacances à chercher des trésors sur la plage. Même si là, c'est pour une meilleure cause. Et maintenant que le 4ème orbe est avec nous, que dois-je faire ?</gold>\
  <br><dark_aqua>Voyageur : Plus qu'un. Comme nous avons fait toute la surface et les nuages, alors il ne nous reste plus qu'à chercher </dark_aqua><light_purple>sous terre</light_purple><dark_aqua>. Il faudra bien se préparer, et notamment un </dark_aqua><light_purple>bon feu</light_purple><dark_aqua>. Pour ce qui est du détecteur, tu as dû voir que l'on a obtenu plusieurs choses.</dark_aqua>\
  <br><gold>Oui, mon inventaire est bien rempli.</gold>\
  <br><dark_aqua>Voyageur : Tout comme la canne à pêche, tu peux y obtenir divers objets comme les </dark_aqua><light_purple>chips</light_purple><dark_aqua>, même si certaines sont très rares, des </dark_aqua><light_purple>somnifères</light_purple><dark_aqua>, un autre </dark_aqua><light_purple>livre enchanté</light_purple><dark_aqua>, ou encore une </dark_aqua><light_purple>pioche </light_purple><dark_aqua>qui te sera utile pour la suite... Je vais d'ailleurs check si tu n'en as pas déjà une.</dark_aqua>
feature.dream.milestone.quest.old_axe.dialog=<dark_aqua>Voyageur : Bien ! Cela va nous être utile. Le prochain objectif va être d'obtenir l'</dark_aqua><light_purple>Orbe de Domination</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>À quoi va-t-elle servir ?</gold>\
  <br><dark_aqua>Voyageur : Je t'expliquerai lorsque tu l'auras. Elle va être facile à récupérer avec la hache.</dark_aqua>\
  <br><gold>Ai-je besoin d'autre chose ?</gold>\
  <br><dark_aqua>Voyageur : Ce n'est pas obligatoire, mais elle te permettrait de rester plus longtemps dans ce monde. Il existe l'armure </dark_aqua><light_purple>"Creaking" </light_purple><dark_aqua>que tu peux fabriquer. Cela te confèrera </dark_aqua>%1$s<dark_aqua> secondes supplémentaires par pièces d'armure équipées.</dark_aqua>
feature.dream.milestone.quest.sleep.dialog=<gold>ZZZzzz... que se passe-t-il !? Suis-je en train de rêver ? Ce... monde à l'air si différent de l'Overworld !</gold>\
  <br><dark_aqua>Voyageur : Que..? Comment est-ce possible ??! Je pensais être le seul ici. Et cela fait si longtemps que je n'ai vu personne...</dark_aqua>\
  <br><gold>Mais, qui es-tu ? Ou es-tu ? et pourquoi me parles-tu ??</gold>\
  <br><dark_aqua>Voyageur : Et bien, bienvenue. Mais chaque chose en son temps. Temps qui va d'ailleurs nous manquer, il faut faire vite, je t'expliquerai tout au fur et à mesure. Pour l'heure, je te propose de découvrir ce dont tu vas avoir besoin pour découvrir ce monde avec la commande </dark_aqua><light_purple>/crafts</light_purple><dark_aqua>.</dark_aqua>\
  <br><dark_aqua>Voyageur : Sache que si tu ne souhaites pas rester jusqu'à la fin du temps, tu peux te réveiller avec la commande </dark_aqua><light_purple>/leave</light_purple><dark_aqua>.\n<dark_aqua>A contrario, tu peux revenir ici plus fréquemment en te fabriquant un </dark_aqua><light_purple>Pyjama</light_purple><dark_aqua>. Cela te permet d'augmenter tes chances de passer dans ce monde en dormant.</dark_aqua>
feature.dream.milestone.quest.soul_orb.dialog=<gold>Et de deux ! En revanche, je n'ai plus l'Orbe de Domination...</gold>\
  <br><dark_aqua>Voyageur : Oui, il te faudra en refaire une. Mais ce n'est pas le plus compliqué.</dark_aqua>\
  <br><dark_aqua>Voyageur : Maintenant que tu as l'Orbe des Âmes, tu vas pouvoir accéder à la </dark_aqua><light_purple>nouvelle zone</light_purple><dark_aqua> qui, tu vas le voir, ne ressemble pas du tout au monde actuel...</dark_aqua>\
  <br><dark_aqua>Voyageur : Il faut monter dans le ciel, dans les </dark_aqua><light_purple>nuages</light_purple><dark_aqua>.</dark_aqua>\
  <br><gold>Peux-tu me parler un peu du but de cette quête ?</gold>\
  <br><dark_aqua>Voyageur : Les orbes sont au nombre de </dark_aqua><light_purple>5</light_purple><dark_aqua>, et chacun d'eux renferme un </dark_aqua><light_purple>pouvoir</light_purple><dark_aqua>. Seuls, ils ne servent à rien. Mais ensemble, ils pourraient aider ce monde.</dark_aqua>\
  <br><gold>Et... toi, tu es qui au fait ?</gold>\
  <br><dark_aqua>Voyageur : J'étais...</dark_aqua>\
  <br><dark_aqua>Voyageur : Je suis un joueur tout comme toi, mais un joueur de </dark_aqua><light_purple>ce monde</light_purple><dark_aqua>.</dark_aqua>
feature.dream.milestone.quest.souls.dialog=<gold>Et de </gold>%1$s<gold> ! Que dois-je faire maintenant ? Il y a un craft spécifique de l'orbe à faire ?</gold>\
  <br><dark_aqua>Voyageur : Non, il faut simplement répéter l'incantation suivante 2 fois : </dark_aqua><light_purple>Ashkara no thari fu laq to</light_purple>\
  <br><gold>Ashkara no thari fu laq to ! Ashkara no thari fu laq to !</gold>\
  <br><gold>...pas facile à dire...</gold>\
  <br><dark_aqua>Voyageur : Ahah, en réalité, il te faut simplement intéragir à nouveau avec l'</dark_aqua><light_purple>Orbe de Domination sur l'</light_purple><light_purple>Altar</light_purple><dark_aqua>.</dark_aqua>

# * QUESTS
feature.dream.milestone.quest.transferable_object.reward=<green>Il y a bien un lien entre cette dimension et le monde réel. Et ce n'est que le début d'une nouvelle aventure !</green>
